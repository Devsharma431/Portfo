<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#030307"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Scan lines -->
  <pattern id="scanlines" width="1200" height="4" patternUnits="userSpaceOnUse">
    <rect width="1200" height="2" fill="#00ffff" opacity="0.02"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#scanlines)"/>
  
  <!-- Corner brackets -->
  <g stroke="url(#accentGrad)" stroke-width="3" fill="none" filter="url(#glow)">
    <path d="M 80 80 h 100 M 80 80 v 100"/>
    <path d="M 1120 80 h -100 M 1120 80 v 100" transform="scale(-1 1) translate(-1200 0)"/>
    <path d="M 80 550 h 100 M 80 550 v -100" transform="scale(1 -1) translate(0 -630)"/>
    <path d="M 1120 550 h -100 M 1120 550 v -100" transform="scale(-1 -1) translate(-1200 -630)"/>
  </g>
  
  <!-- Logo/Brand -->
  <g transform="translate(600, 200)">
    <rect x="-50" y="-50" width="100" height="100" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <text x="0" y="18" font-family="monospace" font-size="56" font-weight="700" fill="url(#accentGrad)" text-anchor="middle" filter="url(#glow)">>></text>
  </g>
  
  <!-- Name -->
  <text x="600" y="330" font-family="Syne, sans-serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-2px">DEV SHARMA</text>
  
  <!-- Title -->
  <text x="600" y="390" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="400" fill="#b8b8d1" text-anchor="middle" letter-spacing="4px">WEB DEVELOPER & SOFTWARE ENGINEER</text>
  
  <!-- Tagline -->
  <text x="600" y="450" font-family="JetBrains Mono, monospace" font-size="18" fill="#00ffff" text-anchor="middle" letter-spacing="3px">BUILDING THE FUTURE</text>
  
  <!-- Bottom accent line -->
  <line x1="400" y1="520" x2="800" y2="520" stroke="url(#accentGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Small text -->
  <text x="600" y="560" font-family="JetBrains Mono, monospace" font-size="14" fill="#6b6b8a" text-anchor="middle">devsharma.example.com  |  github.com/Devsharma431</text>
</svg>